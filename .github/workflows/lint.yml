name: lint

on:
  push:
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check (bash -n)
        run: |
          for f in install.sh install-mac.sh install-linux.sh lib/common.sh versions.env setup-access.sh; do
            bash -n "$f"
          done

      - name: ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck -x --source-path=SCRIPTDIR \
            install.sh install-mac.sh install-linux.sh lib/common.sh setup-access.sh
